traefik:
  name: traefik
  namespace: kube-system

deployment:
  kind: DaemonSet

service:
  externalTrafficPolicy: Local

logs:
  access:
    enabled: false

plugins:
  simpleCache:
    enabled: true
    moduleName: github.com/traefik/plugin-simplecache
    version: v0.2.1

ports:
  anubis:
    enabled: true
    port: 3923
    serviceName: traefik-anubis
    selector:
      app.kubernetes.io/name: traefik
      app.kubernetes.io/instance: traefik-kube-system
  web:
    redirectTo:
      port: websecure
      scheme: https
      permanent: true
