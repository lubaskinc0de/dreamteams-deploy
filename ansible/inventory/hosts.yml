k3s_cluster:
  children:
    server:
      hosts:
        YOUR_VDS_IP:
    agent:
      hosts: {}

  vars:
    k3s_version: v1.32.2+k3s1
    # vds_setup runs as root (cluster user doesn't exist yet).
    # After setup, the cluster user owns the environment.
    ansible_user: root

    api_endpoint: "{{ hostvars[groups['server'][0]]['ansible_host'] | default(groups['server'][0]) }}"