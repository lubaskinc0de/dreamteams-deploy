k3s_cluster:                                                                                 
  children:                                                                                  
    server:                                                                                  
      hosts:                                                                                 
        YOUR_VDS_IP:                                                                         
    agent:
      hosts: {}

  vars:
    k3s_version: v1.32.2+k3s1
    ansible_user: root
    ansible_ssh_private_key_file: ~/.ssh/id_ed25519
    api_endpoint: "{{ hostvars[groups['server'][0]]['ansible_host'] | default(groups['server'][0]) }}"