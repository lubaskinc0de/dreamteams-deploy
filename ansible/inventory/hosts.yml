k3s_cluster:
  children:
    server:
      hosts:
        k3s-server-1:
          ansible_host: YOUR_FIRST_SERVER_IP
          # If nodes talk over a private network, put the private address here.
          # k3s_firewall_ip: 10.0.0.11
        # For HA with embedded etcd, use 3/5/7 server nodes.
        # k3s-server-2:
        #   ansible_host: YOUR_SECOND_SERVER_IP
        #   k3s_firewall_ip: 10.0.0.12
        # k3s-server-3:
        #   ansible_host: YOUR_THIRD_SERVER_IP
        #   k3s_firewall_ip: 10.0.0.13
    agent:
      hosts:
        # k3s-agent-1:
        #   ansible_host: YOUR_WORKER_IP
        #   k3s_firewall_ip: 10.0.0.21

  vars:
    ansible_user: "{{ lookup('env', 'ANSIBLE_USER') | default('root', true) }}"
    ansible_ssh_private_key_file: "{{ lookup('env', 'ANSIBLE_PRIVATE_KEY_FILE') | default('~/.ssh/id_ed25519', true) }}"

    # If you have an external LB/VIP in front of control-plane nodes, set:
    # k3s_api_endpoint: 203.0.113.10
    api_endpoint: "{{ k3s_api_endpoint | default(hostvars[groups['server'][0]]['ansible_host'] | default(groups['server'][0])) }}"
