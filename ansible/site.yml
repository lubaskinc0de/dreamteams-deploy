- name: Preflight checks
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Validate k3s topology
      ansible.builtin.assert:
        that:
          - groups['server'] | length > 0
          - groups['server'] | length == 1 or groups['server'] | length is odd
          - groups['server'] | length in [1, 3, 5, 7]
        fail_msg: "Use 1 server node, or 3/5/7 server nodes for embedded-etcd HA."

    - name: Validate production bootstrap vars
      ansible.builtin.assert:
        that:
          - bootstrap_apps_path == 'apps/prod'
          - app_host is defined and app_host | length > 0
          - "'example.com' not in app_host"
          - auth_host is defined and auth_host | length > 0
          - s3_host is defined and s3_host | length > 0
          - grafana_host is defined and grafana_host | length > 0
          - letsencrypt_email is defined and letsencrypt_email | length > 0
          - ssh_public_key is defined and ssh_public_key | length > 0
          - (deploy_repo is not match('^(git@|ssh://)')) or (deploy_repo_ssh_private_key is defined and deploy_repo_ssh_private_key | length > 0) or (ssh_private_key is defined and ssh_private_key | length > 0)
        fail_msg: "Fill prod hosts, SSH_PUBLIC_KEY, and deploy repo SSH key when deploy_repo uses SSH."

    - name: Find production sealed secret manifests
      ansible.builtin.find:
        paths: "{{ playbook_dir }}/../sealed-secrets/prod"
        patterns:
          - "*.yaml"
          - "*.yml"
        file_type: file
      register: prod_sealed_secret_files

    - name: Read production sealed secret manifests
      ansible.builtin.slurp:
        src: "{{ item.path }}"
      loop: "{{ prod_sealed_secret_files.files }}"
      register: prod_sealed_secret_manifests
      no_log: true

    - name: Collect production sealed secret names
      ansible.builtin.set_fact:
        prod_sealed_secret_names: "{{ prod_sealed_secret_manifests.results | map(attribute='content') | map('b64decode') | join('\n') | regex_findall('(?m)^  name: ([A-Za-z0-9._-]+)$') }}"

    - name: Validate production secrets are represented by SealedSecrets
      ansible.builtin.assert:
        that:
          - prod_required_secret_names | difference(prod_sealed_secret_names) | length == 0
        fail_msg: "sealed-secrets/prod is missing SealedSecret manifests for: {{ prod_required_secret_names | difference(prod_sealed_secret_names) | join(', ') }}"

    - name: Check local SSH known_hosts entries for cluster nodes
      ansible.builtin.command:
        argv:
          - ssh-keygen
          - -F
          - "{{ hostvars[item].ansible_host | default(item) }}"
      loop: "{{ groups['server'] + (groups['agent'] | default([])) }}"
      register: ssh_known_hosts_checks
      changed_when: false
      failed_when: false
      when: (lookup('env', 'ANSIBLE_HOST_KEY_CHECKING') | default('true', true) | lower) not in ['false', '0', 'no']

    - name: Validate local SSH known_hosts entries
      ansible.builtin.assert:
        that:
          - ssh_known_hosts_checks.results | selectattr('rc', 'ne', 0) | list | length == 0
        fail_msg: "Missing SSH known_hosts entries for cluster nodes. Verify each provider fingerprint, then add it with: just prod-known-host <host> <SHA256:fingerprint>"
      when: (lookup('env', 'ANSIBLE_HOST_KEY_CHECKING') | default('true', true) | lower) not in ['false', '0', 'no']

# Step 1: harden every node, create cluster user, configure firewall.
# Runs as root since the cluster user doesn't exist yet.
- name: Setup cluster nodes
  hosts: k3s_cluster
  become: true
  roles:
    - vds_setup
  post_tasks:
    - name: Use cluster user for the rest of the bootstrap
      ansible.builtin.set_fact:
        ansible_user: "{{ cluster_user }}"

    - name: Reset SSH connection after switching user
      ansible.builtin.meta: reset_connection

# Step 2: install k3s using the official k3s-ansible collection.
- name: Setup k3s cluster
  ansible.builtin.import_playbook: k3s.orchestration.site

# k3s-ansible opens broad UFW rules for convenience; tighten them back down.
- name: Lock down cluster firewall
  hosts: k3s_cluster
  become: true
  roles:
    - firewall_lockdown

# Step 3: bootstrap ArgoCD and deploy all applications.
- name: Bootstrap applications
  hosts: "{{ groups['server'][0] }}"
  become: true
  roles:
    - argocd

- name: Apply final node hardening
  hosts: k3s_cluster
  become: true
  roles:
    - post_bootstrap_hardening
