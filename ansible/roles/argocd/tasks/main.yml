- name: Install Helm
  ansible.builtin.shell:
    cmd: set -o pipefail && curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
    executable: /bin/bash
    creates: /usr/local/bin/helm

- name: Install ArgoCD CLI
  ansible.builtin.get_url:
    url: "https://github.com/argoproj/argo-cd/releases/download/{{ argocd_cli_version }}/argocd-linux-amd64"
    dest: /usr/local/bin/argocd
    mode: '0755'

- name: Create bootstrap namespaces
  ansible.builtin.command:
    cmd: kubectl create namespace {{ item }} --dry-run=client -o yaml
  register: bootstrap_namespace
  changed_when: false
  loop:
    - "{{ argocd_namespace }}"
    - "{{ app_namespace }}"
    - "{{ authentik_namespace }}"
    - "{{ observability_namespace }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Apply bootstrap namespaces
  ansible.builtin.command:
    cmd: kubectl apply -f -
    stdin: "{{ item.stdout }}"
  loop: "{{ bootstrap_namespace.results }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Add ArgoCD Helm repo
  ansible.builtin.command:
    cmd: helm repo add argo https://argoproj.github.io/argo-helm --force-update
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Update Helm repos
  ansible.builtin.command:
    cmd: helm repo update
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Render ArgoCD Helm security values
  ansible.builtin.copy:
    dest: /tmp/argocd-security-values.yaml
    mode: '0644'
    content: "{{ {'configs': {'ssh': {'extraHosts': argocd_ssh_known_hosts}}} | to_nice_yaml }}"

- name: Install or upgrade ArgoCD
  ansible.builtin.command:
    cmd: >
      helm upgrade --install argocd argo/argo-cd
      --namespace {{ argocd_namespace }}
      --create-namespace
      --version {{ argocd_chart_version }}
      --values /tmp/argocd-security-values.yaml
      --set server.service.type=ClusterIP
      --set configs.rbac.policy\.csv='g, admin, role:admin'
      --wait
      --timeout 10m
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Wait for ArgoCD server to be ready
  ansible.builtin.command:
    cmd: kubectl wait --for=condition=available deployment/argocd-server -n {{ argocd_namespace }} --timeout=180s
  retries: 3
  delay: 15
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Remove rendered ArgoCD Helm security values
  ansible.builtin.file:
    path: /tmp/argocd-security-values.yaml
    state: absent

- name: Render ArgoCD deploy repository secret
  ansible.builtin.template:
    src: repository-secret.yaml.j2
    dest: /tmp/argocd-deploy-repo-secret.yaml
    mode: '0600'
  no_log: true

- name: Apply ArgoCD deploy repository secret
  ansible.builtin.command:
    cmd: kubectl apply -f /tmp/argocd-deploy-repo-secret.yaml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  no_log: true

- name: Remove rendered ArgoCD deploy repository secret
  ansible.builtin.file:
    path: /tmp/argocd-deploy-repo-secret.yaml
    state: absent
  no_log: true

- name: Create temporary ArgoCD application manifest directory
  ansible.builtin.file:
    path: /tmp/dreamteams-prod-apps
    state: directory
    mode: '0700'

- name: Render production ArgoCD application manifests
  ansible.builtin.copy:
    dest: "/tmp/dreamteams-prod-apps/{{ item | basename }}"
    mode: '0600'
    content: >-
      {{
        lookup('ansible.builtin.file', item)
        | replace('git@github.com:lubaskinc0de/dreamteams-deploy.git', deploy_repo)
        | replace('targetRevision: HEAD', 'targetRevision: ' ~ deploy_repo_revision)
        | replace('auth.dreamteams.example.com', auth_host)
        | replace('grafana.dreamteams.example.com', grafana_host)
        | replace('s3.dreamteams.example.com', s3_host)
        | replace('dreamteams.example.com', app_host)
        | replace('lubaskincorporation@gmail.com', letsencrypt_email)
      }}
  loop: "{{ query('ansible.builtin.fileglob', playbook_dir ~ '/../' ~ bootstrap_apps_path ~ '/*.yaml') }}"

- name: Apply production ArgoCD applications
  ansible.builtin.command:
    cmd: kubectl apply -f /tmp/dreamteams-prod-apps
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Remove rendered ArgoCD application manifests
  ansible.builtin.file:
    path: /tmp/dreamteams-prod-apps
    state: absent

- name: Create .kube directory for cluster user
  ansible.builtin.file:
    path: /home/{{ cluster_user }}/.kube
    state: directory
    owner: "{{ cluster_user }}"
    mode: '0700'

- name: Copy kubeconfig to cluster user
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: /home/{{ cluster_user }}/.kube/config
    remote_src: yes
    owner: "{{ cluster_user }}"
    mode: '0600'

- name: Check if just package is available
  ansible.builtin.command:
    cmd: apt-cache policy just
  register: just_package_policy
  changed_when: false
  failed_when: false

- name: Install just when available from apt
  ansible.builtin.apt:
    name: just
    state: present
  when:
    - just_package_policy.rc == 0
    - "'Candidate: (none)' not in just_package_policy.stdout"

- name: Create cluster ops helper directory
  ansible.builtin.file:
    path: /home/{{ cluster_user }}/cluster-ops
    state: directory
    owner: "{{ cluster_user }}"
    group: "{{ cluster_user }}"
    mode: '0755'

- name: Render control-plane ops Justfile
  ansible.builtin.template:
    src: control-plane.Justfile.j2
    dest: /home/{{ cluster_user }}/cluster-ops/Justfile
    owner: "{{ cluster_user }}"
    group: "{{ cluster_user }}"
    mode: '0644'

- name: Link ops Justfile from cluster user home
  ansible.builtin.file:
    src: /home/{{ cluster_user }}/cluster-ops/Justfile
    dest: /home/{{ cluster_user }}/Justfile
    state: link
    owner: "{{ cluster_user }}"
    group: "{{ cluster_user }}"
