oauth2-proxy:
  image:
    tag: v7.11.0-alpine
  replicaCount: 1
  config:
    existingSecret: dreamteams-oauth2proxy-secret
    configFile: |
      upstreams=["static://202"]
      reverse_proxy=true
      cookie_httponly=true
      cookie_secure=true
      request_logging=true
      auth_logging=true
      standard_logging=true
      session_store_type="redis"
      redis_connection_url="redis://dreamteams-redis-master:6379/2"
      skip_provider_button=true
      set_xauthrequest=true
      set_authorization_header=true
      pass_authorization_header=true
      pass_access_token=true
      insecure_oidc_allow_unverified_email=true
      ssl_insecure_skip_verify=true
      provider="oidc"
      redirect_url="https://dreamteams.localhost/oauth2/callback"
      oidc_issuer_url="https://auth.dreamteams.localhost/application/o/dreamteams/"
      scope="openid email profile offline_access"
      code_challenge_method="S256"
      email_domains="*"
      whitelist_domains=["auth.dreamteams.localhost","dreamteams.localhost"]
      cookie_refresh="4m"
      cookie_expire="720h"
      cookie_csrf_per_request=true
      force_json_errors=true
      skip_auth_routes=[
          "/api/competitions/preview"
      ]
  service:
    type: ClusterIP
    portNumber: 8000
  extraInitContainers:
    - name: wait-for-oidc
      image: busybox:1.37
      imagePullPolicy: IfNotPresent
      command:
        - sh
        - -c
        - |
          until wget -q -T 5 -O /dev/null --no-check-certificate https://auth.dreamteams.localhost/application/o/dreamteams/.well-known/openid-configuration; do
            sleep 2
          done
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  securityContext:
    enabled: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  podSecurityContext:
    runAsNonRoot: true
  serviceAccount:
    automountServiceAccountToken: false
