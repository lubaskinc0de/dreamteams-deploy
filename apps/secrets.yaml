apiVersion: argoproj.io/v1alpha1                                                             
kind: Application                                                                            
metadata:                                                                                    
  name: dreamteams-secrets                                                             
  namespace: argocd                                                                          
  annotations:                                                                               
    argocd.argoproj.io/sync-wave: "-1"                                                        
spec:                                                                                        
  project: default                                                                           
  source:
    repoURL: git@github.com:lubaskinc0de/dreamteams-deploy.git  # Your deploy repo
    targetRevision: HEAD            # Always use latest commit on main branch
    path: sealed-secrets/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: dreamteams
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true