postgresql:
  image:
    tag: 18.3.0
  auth:                                                                                      
    existingSecret: dreamteams-postgres-secret                                               
    secretKeys:                                                                              
      adminPasswordKey: postgres-password
      userPasswordKey: password
    username: postgres
    database: postgres
  primary:
    initdb:
      scriptsSecret: dreamteams-postgres-initdb
    extendedConfiguration: |
      max_connections = 80
      shared_buffers = 256MB
      effective_cache_size = 1536MB
      work_mem = 2MB
      maintenance_work_mem = 64MB
      wal_buffers = 16MB
      min_wal_size = 128MB
      max_wal_size = 768MB
      checkpoint_timeout = 10min
      checkpoint_completion_target = 0.9
      effective_io_concurrency = 100
      random_page_cost = 1.1
      temp_file_limit = 256MB
      statement_timeout = 30s
      idle_in_transaction_session_timeout = 60s
      lock_timeout = 5s
      track_io_timing = on
      jit = off
      log_min_duration_statement = 500ms
      timezone = 'UTC'
    persistence:
      size: 1Gi
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    networkPolicy:
      allowExternal: false
      allowExternalEgress: false
