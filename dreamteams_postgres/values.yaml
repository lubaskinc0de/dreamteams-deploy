postgresql:
  image:
    tag: ""
    digest: sha256:d0fd908dfe8697467f930c1894fcdbbbbd093e3dcf104204a00121ffef017749
  auth:                                                                                      
    existingSecret: dreamteams-postgres-secret                                               
    secretKeys:                                                                              
      adminPasswordKey: postgres-password
      userPasswordKey: password
    username: postgres
    database: postgres
  primary:
    initdb:
      scriptsSecret: dreamteams-postgres-initdb
    extendedConfiguration: |
      max_connections = 300
      shared_buffers = 2GB
      effective_cache_size = 6GB
      work_mem = 8MB
      maintenance_work_mem = 512MB
      wal_buffers = 32MB
      min_wal_size = 1GB
      max_wal_size = 4GB
      checkpoint_timeout = 15min
      checkpoint_completion_target = 0.9
      synchronous_commit = on
      random_page_cost = 1.1
      effective_io_concurrency = 200
      default_statistics_target = 100
      max_worker_processes = 4
      max_parallel_workers = 4
      max_parallel_workers_per_gather = 2
      max_parallel_maintenance_workers = 2
      statement_timeout = 30s
      idle_in_transaction_session_timeout = 60s
      lock_timeout = 5s
      track_io_timing = on
      track_functions = pl
      jit = off
      log_min_duration_statement = 200ms
      log_lock_waits = on
      log_temp_files = 0
      log_checkpoints = on
      log_autovacuum_min_duration = 1s
      autovacuum = on
      autovacuum_naptime = 30s
      timezone = 'UTC'
    persistence:
      size: 1Gi
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2500m
        memory: 4Gi
    networkPolicy:
      allowExternal: false
      allowExternalEgress: false
