apiVersion: batch/v1
kind: Job
metadata:
  name: dreamteams-nats-stream
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    dreamteams.io/stream-name: {{ .Values.stream.name | quote }}
    dreamteams.io/stream-max-age: {{ .Values.stream.maxAge | quote }}
  labels:
    app.kubernetes.io/name: dreamteams-nats-stream
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dreamteams-nats-stream
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: stream
          image: {{ .Values.streamJob.image }}
          workingDir: /tmp
          env:
            - name: HOME
              value: /tmp
          command:
            - sh
            - -c
            - |
              until nats --server nats://dreamteams-nats:{{ .Values.service.clientPort }} server check connection; do
                sleep 2
              done
              nats --server nats://dreamteams-nats:{{ .Values.service.clientPort }} stream add {{ .Values.stream.name }} \
                --subjects {{ join "," .Values.stream.subjects }} \
                --storage {{ .Values.stream.storage }} \
                --retention {{ .Values.stream.retention }} \
                --max-age {{ .Values.stream.maxAge }} \
                --defaults || \
              nats --server nats://dreamteams-nats:{{ .Values.service.clientPort }} stream update {{ .Values.stream.name }} \
                --subjects {{ join "," .Values.stream.subjects }} \
                --max-age {{ .Values.stream.maxAge }} \
                --force
          securityContext:
            {{- toYaml .Values.streamJob.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.streamJob.resources | nindent 12 }}
