{{- if eq .Values.issuer.type "selfSigned" }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.issuer.name }}
spec:
  selfSigned: {}
{{- else if eq .Values.issuer.type "letsencrypt" }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.issuer.name }}
spec:
  acme:
    email: {{ .Values.issuer.email | quote }}
    server: {{ .Values.issuer.server | quote }}
    privateKeySecretRef:
      name: {{ .Values.issuer.privateKeySecretName }}
    solvers:
      - http01:
          ingress:
            class: {{ .Values.issuer.ingressClass }}
{{- end }}
