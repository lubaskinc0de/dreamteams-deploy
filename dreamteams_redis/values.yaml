redis:
  image:
    tag: 8.6.1
  auth:
    enabled: false
  networkPolicy:
    allowExternal: false
    allowExternalEgress: false
  master:
    persistence:
      size: 256Mi
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 192Mi
  replica:
    replicaCount: 0
