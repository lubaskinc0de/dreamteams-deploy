authentik:
  global:
    affinity:
      podAntiAffinity: none
      nodeAffinity:
        type: none

  authentik:
    enabled: true
    existingSecret:
      secretName: authentik-env
    error_reporting:
      enabled: false
    postgresql:
      host: dreamteams-authentik-postgresql
      name: authentik
      user: authentik
      password: ""

  server:
    replicas: 1
    ingress:
      enabled: false
    resources:
      requests:
        cpu: 100m
        memory: 384Mi
      limits:
        cpu: 1000m
        memory: 768Mi

  worker:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 384Mi
      limits:
        cpu: 1000m
        memory: 768Mi

  postgresql:
    enabled: true
    auth:
      existingSecret: authentik-postgres-secret
      secretKeys:
        adminPasswordKey: postgres-password
        userPasswordKey: password
      username: authentik
      database: authentik
    primary:
      extendedConfiguration: |
        max_connections = 50
        shared_buffers = 96MB
        effective_cache_size = 384MB
        work_mem = 2MB
        maintenance_work_mem = 32MB
        min_wal_size = 80MB
        max_wal_size = 384MB
        checkpoint_timeout = 10min
        checkpoint_completion_target = 0.9
        temp_file_limit = 128MB
      persistence:
        size: 1Gi
      resources:
        requests:
          cpu: 75m
          memory: 256Mi
        limits:
          cpu: 750m
          memory: 768Mi

  redis:
    enabled: true
    master:
      persistence:
        size: 256Mi
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 250m
          memory: 192Mi
    replica:
      replicaCount: 0

dreamteamsOidc:
  enabled: false
  appName: DreamTeams
  name: dreamteams
  slug: dreamteams
  clientIdEnv: DREAMTEAMS_OIDC_CLIENT_ID
  clientSecretEnv: DREAMTEAMS_OIDC_CLIENT_SECRET
  redirectUri: https://dreamteams.localhost/oauth2/callback
  captcha:
    enabled: false
    publicKeyEnv: DREAMTEAMS_CAPTCHA_PUBLIC_KEY
    privateKeyEnv: DREAMTEAMS_CAPTCHA_PRIVATE_KEY
    jsUrl: https://js.hcaptcha.com/1/api.js
    apiUrl: https://api.hcaptcha.com/siteverify
    interactive: true
  text:
    authenticationTitle: Вход в DreamTeams
    enrollmentTitle: Создайте аккаунт DreamTeams
    emailLabel: Электронная почта
    emailPlaceholder: email@example.com
    passwordLabel: Пароль
    passwordRepeatLabel: Подтвердите пароль
    invalidEmailMessage: Введите корректный адрес электронной почты.
    passwordMismatchMessage: Пароли не совпадают.
  emailVerification:
    friendlyName: Электронная почта
    subject: Код подтверждения DreamTeams
    tokenExpiry: minutes=30
