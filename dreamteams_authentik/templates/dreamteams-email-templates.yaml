apiVersion: v1
kind: ConfigMap
metadata:
  name: dreamteams-authentik-email-templates
data:
  dreamteams-email-otp.html: |
    {% extends "email/base.html" %}
    {% load humanize %}
    {% block content %}
    <tr>
        <td class="alert alert-success">
            Код подтверждения DreamTeams
        </td>
    </tr>
    <tr>
        <td class="content-wrap">
            <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                    <td class="content-block">
                        Для продолжения введите этот код на странице DreamTeams:
                    </td>
                </tr>
                <tr>
                    <td class="content-block" style="font-size: 28px; font-weight: 700; letter-spacing: 4px;">
                        {{ "{{ token }}" }}
                    </td>
                </tr>
                <tr>
                    <td class="content-block">
                        Код действует до {{ "{{ expires|naturaltime }}" }}.
                    </td>
                </tr>
                <tr>
                    <td class="content-block">
                        Если вы не запрашивали этот код, просто проигнорируйте письмо.
                    </td>
                </tr>
            </table>
        </td>
    </tr>
    {% endblock %}
  dreamteams-email-otp.txt: |
    Код подтверждения DreamTeams

    Для продолжения введите этот код на странице DreamTeams:

    {{ "{{ token }}" }}

    Код действует до {{ "{{ expires|naturaltime }}" }}.

    Если вы не запрашивали этот код, просто проигнорируйте письмо.
