apiVersion: v1
kind: ConfigMap
metadata:
  name: dreamteams-authentik-email-templates
data:
  dreamteams-email-otp.html: |
    {% extends "email/base.html" %}
    {% block content %}
    <tr>
        <td style="padding: 0;">
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="width: 100%; border-collapse: collapse; font-family: Arial, Helvetica, sans-serif; color: #172033;">
                <tr>
                    <td style="padding: 30px 28px 8px; background: #ffffff; border-radius: 18px 18px 0 0;">
                        <div style="font-size: 24px; line-height: 30px; font-weight: 700; color: #111827;">DreamTeams</div>
                        <div style="margin-top: 4px; font-size: 13px; line-height: 19px; color: #667085;">Агрегатор IT-хакатонов и платформа для поиска команды</div>
                    </td>
                </tr>
                <tr>
                    <td style="padding: 24px 28px 4px; background: #ffffff;">
                        <div style="font-size: 14px; line-height: 20px; font-weight: 700; text-transform: uppercase; color: #2563eb; letter-spacing: 0.08em;">Код подтверждения</div>
                        <h1 style="margin: 8px 0 0; font-size: 28px; line-height: 36px; font-weight: 700; color: #111827;">Подтвердите вход в DreamTeams</h1>
                    </td>
                </tr>
                <tr>
                    <td style="padding: 12px 28px 0; background: #ffffff;">
                        <p style="margin: 0; font-size: 16px; line-height: 25px; color: #344054;">Введите этот код на странице DreamTeams, чтобы продолжить регистрацию или восстановление доступа.</p>
                    </td>
                </tr>
                <tr>
                    <td style="padding: 24px 28px; background: #ffffff;">
                        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="width: 100%; border-collapse: collapse;">
                            <tr>
                                <td align="center" style="padding: 22px 16px; border: 1px solid #dbe7ff; border-radius: 16px; background: #f5f8ff;">
                                    <div style="font-size: 36px; line-height: 44px; font-weight: 700; color: #1d4ed8; letter-spacing: 0.16em;">{{ "{{ token }}" }}</div>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
                <tr>
                    <td style="padding: 0 28px 28px; background: #ffffff;">
                        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="width: 100%; border-collapse: collapse;">
                            <tr>
                                <td style="padding: 16px 18px; border-radius: 14px; background: #f8fafc; color: #475467; font-size: 14px; line-height: 22px;">
                                    Код действует до <strong style="color: #111827;">{{ "{{ expires }}" }}</strong>. Если вы не запрашивали этот код, просто проигнорируйте письмо.
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
                <tr>
                    <td style="padding: 18px 28px 26px; border-top: 1px solid #eef2f7; background: #ffffff; border-radius: 0 0 18px 18px;">
                        <div style="font-size: 12px; line-height: 18px; color: #98a2b3;">DreamTeams помогает находить IT-хакатоны и собирать команды для участия.</div>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
    {% endblock %}
  dreamteams-email-otp.txt: |
    DreamTeams
    Агрегатор IT-хакатонов и платформа для поиска команды

    Код подтверждения

    Введите этот код на странице DreamTeams, чтобы продолжить регистрацию или восстановление доступа:

    {{ "{{ token }}" }}

    Код действует до {{ "{{ expires }}" }}.

    Если вы не запрашивали этот код, просто проигнорируйте письмо.
