apiVersion: v1
kind: Service
metadata:
  name: grafana
spec:
  ports:
    - name: http
      port: 3000
      targetPort: http
  selector:
    app: grafana
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
spec:
  ports:
    - name: http
      port: 9090
      targetPort: http
  selector:
    app: prometheus
---
apiVersion: v1
kind: Service
metadata:
  name: loki
spec:
  ports:
    - name: http
      port: 3100
      targetPort: http
  selector:
    app: loki
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
spec:
  ports:
    - name: http
      port: 3200
      targetPort: http
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
  selector:
    app: tempo
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
spec:
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
    - name: metrics
      port: 8889
      targetPort: metrics
  selector:
    app: otel-collector
---
apiVersion: v1
kind: Service
metadata:
  name: node-exporter
spec:
  ports:
    - name: metrics
      port: 9100
      targetPort: metrics
  selector:
    app: node-exporter
