---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tempo
spec:
  serviceName: tempo
  replicas: 1
  selector:
    matchLabels:
      app: tempo
  template:
    metadata:
      labels:
        app: tempo
      annotations:
        checksum/config: {{ .Files.Get "tempo.yaml" | sha256sum }}
    spec:
      containers:
        - name: tempo
          image: {{ .Values.tempo.image }}
          args:
            - -config.file=/etc/tempo/tempo.yaml
          ports:
