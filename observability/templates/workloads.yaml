    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
      annotations:
        checksum/config: {{ .Files.Get "loki.yaml" | sha256sum }}
    spec:
      containers:
        - name: loki
          image: {{ .Values.loki.image }}
          args:
            - -config.file=/etc/loki/loki.yaml
          ports:
            - name: http
              containerPort: 3100
          volumeMounts:
            - name: config
              mountPath: /etc/loki/loki.yaml
              subPath: loki.yaml
            - name: data
              mountPath: /loki
          resources:
            {{- toYaml .Values.loki.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
