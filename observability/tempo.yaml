server:
  http_listen_port: 3200
  grpc_listen_port: 9095

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
        grpc:
          endpoint: 0.0.0.0:4317

target: all
ingester:
  trace_idle_period: 10s
  max_block_duration: 5m
  complete_block_timeout: 1m

compactor:
  compaction:
    block_retention: 12h

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo
