grafana:
  image: grafana/grafana:12.1.4
  storageSize: 512Mi
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  resources:
    requests:
      cpu: 75m
      memory: 192Mi
    limits:
      cpu: 500m
      memory: 512Mi

prometheus:
  image: prom/prometheus:v3.11.2
  storageSize: 512Mi
  retention: 24h
  resources:
    requests:
      cpu: 75m
      memory: 192Mi
    limits:
      cpu: 500m
      memory: 512Mi

alertmanager:
  image: prom/alertmanager:v0.32.0
  storageSize: 128Mi
  config:
    existingSecret: alertmanager-config
    key: alertmanager.yml
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

loki:
  image: grafana/loki:3.4.1
  storageSize: 512Mi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

tempo:
  image: grafana/tempo:2.9.0
  storageSize: 512Mi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

otelCollector:
  image: otel/opentelemetry-collector-contrib:0.114.0
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 500m
      memory: 256Mi

vector:
  image: timberio/vector:0.48.0-debian
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 500m
      memory: 256Mi

nodeExporter:
  image: prom/node-exporter:v1.11.1
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 96Mi

kubeStateMetrics:
  image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.18.0
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
