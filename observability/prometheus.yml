global:
    scrape_interval: 15s
    evaluation_interval: 15s

scrape_configs:
    - job_name: 'prometheus'
      static_configs:
          - targets: ['localhost:9090']

    - job_name: 'node'
      static_configs:
          - targets: ['node-exporter:9100']

    # All app metrics now arrive via OTel Collector — workers push OTLP, collector
    # aggregates across resource attrs (service.instance.id stripped) and exposes them here.
    - job_name: 'dreamteams'
      static_configs:
          - targets: ['otel-collector:8889']
