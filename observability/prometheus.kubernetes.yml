global:
    scrape_interval: 30s
    evaluation_interval: 30s

rule_files:
    - /etc/prometheus/rules/*.yml

alerting:
    alertmanagers:
        - static_configs:
              - targets: ['alertmanager:9093']

scrape_configs:
    - job_name: 'prometheus'
      static_configs:
          - targets: ['localhost:9090']

    - job_name: 'alertmanager'
      static_configs:
          - targets: ['alertmanager:9093']

    - job_name: 'node'
      static_configs:
          - targets: ['node-exporter:9100']

    - job_name: 'kube-state-metrics'
      static_configs:
          - targets: ['kube-state-metrics:8080']

    # All app metrics now arrive via OTel Collector — workers push OTLP, collector
    # aggregates across resource attrs (service.instance.id stripped) and exposes them here.
    - job_name: 'dreamteams'
      static_configs:
          - targets: ['otel-collector:8889']
