sources:
    kubernetes_logs:
        type: kubernetes_logs
        extra_label_selector: "app.kubernetes.io/name in (dreamteams-api,dreamteams-exporter,authentik,oauth2-proxy,postgresql,traefik)"

transforms:
    logs_parser:
        inputs:
            - kubernetes_logs
        type: remap
        source: |
            raw_container = string!(.kubernetes.container_name)
            dt_container_name = if raw_container == "dreamteams-api" {
              "api"
            } else {
              raw_container
            }
            dt_namespace = string!(.kubernetes.pod_namespace)
            dt_pod = string!(.kubernetes.pod_name)

            raw_message = strip_ansi_escape_codes(string!(.message))
            parsed, err = parse_json(raw_message)

            if is_null(err) {
              . = parsed
              event_value = if !is_null(.event) {
                .event
              } else if !is_null(.message) {
                .message
              } else if !is_null(.msg) {
                .msg
              } else {
                raw_message
              }
              .event = strip_ansi_escape_codes(string(event_value) ?? raw_message)
            } else {
              . = {}
              .event = raw_message
            }

            .trace_id = if !is_null(.trace_id) { .trace_id } else { "" }
            .dt_container_name = dt_container_name
            .dt_namespace = dt_namespace
            .dt_pod = dt_pod
            level_value = if !is_null(.level) {
              .level
            } else if !is_null(.severity) {
              .severity
            } else {
              "unknown"
            }
            .dt_level = string(level_value) ?? "unknown"

sinks:
    loki_sink:
        inputs:
            - logs_parser
        type: loki
        healthcheck:
            enabled: true
        endpoint: http://loki:3100
        remove_label_fields: true
        encoding:
            codec: json
        batch:
            max_events: 250
            timeout_secs: 1
        labels:
            container_name: "{{dt_container_name}}"
            namespace: "{{dt_namespace}}"
            pod: "{{dt_pod}}"
            level: "{{dt_level}}"
