apiVersion: 1

datasources:
    - name: Loki
      type: loki
      uid: loki
      access: proxy
      url: http://loki:3100
      basicAuth: false
      isDefault: true
      editable: true
      orgId: 1
      version: 1
      jsonData:
          timeInterval: 15s
          derivedFields:
              - datasourceUid: tempo
                matcherRegex: '"trace_id":\s*"([a-f0-9]{32})"'
                name: TraceID
                url: "${__value.raw}"
                urlDisplayLabel: "Go to Trace"

    - name: Tempo
      type: tempo
      uid: tempo
      access: proxy
      url: http://tempo:3200
      isDefault: false
      jsonData:
          httpMethod: POST
          search:
              hide: false
          tracesToLogsV2:
              datasourceUid: loki
              filterByTraceID: false
              filterBySpanID: false
              customQuery: true
              query: '{container_name="api"} | json | trace_id="${__trace.traceId}"'
          serviceMap:
              datasourceUid: prometheus

    - name: Prometheus
      type: prometheus
      uid: prometheus
      url: http://prometheus:9090
      access: proxy
      isDefault: false
      editable: true
