{{- if .Values.tls.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: dreamteams-app
  namespace: dreamteams
spec:
  secretName: {{ .Values.tls.appSecretName }}
  dnsNames:
    - {{ .Values.appHost }}
    {{- if and .Values.apexRedirect.enabled .Values.apexHost }}
    - {{ .Values.apexHost }}
    {{- end }}
  issuerRef:
    name: {{ .Values.issuerName }}
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: dreamteams-s3
  namespace: dreamteams
spec:
  secretName: {{ .Values.tls.s3SecretName }}
  dnsNames:
    - {{ .Values.s3Host }}
  issuerRef:
    name: {{ .Values.issuerName }}
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: dreamteams-auth
  namespace: {{ .Values.services.authentik.namespace }}
spec:
  secretName: {{ .Values.tls.authSecretName }}
  dnsNames:
    - {{ .Values.authHost }}
  issuerRef:
    name: {{ .Values.issuerName }}
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: dreamteams-grafana
  namespace: {{ .Values.services.grafana.namespace }}
spec:
  secretName: {{ .Values.tls.grafanaSecretName }}
  dnsNames:
    - {{ .Values.grafanaHost }}
  issuerRef:
    name: {{ .Values.issuerName }}
    kind: ClusterIssuer
---
{{- end }}
{{- if .Values.anubis.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: dreamteams-web-gate
  namespace: dreamteams
spec:
  entryPoints:
    - websecure
  {{- if .Values.tls.enabled }}
  tls:
    secretName: {{ .Values.tls.appSecretName }}
  {{- end }}
  routes:
    - match: Host(`{{ .Values.appHost }}`)
      kind: Rule
      priority: 1
      {{- if or .Values.securityHeaders.enabled .Values.rateLimits.enabled }}
      middlewares:
        {{- include "dreamteams_ingress.securityHeadersRef" . | nindent 8 }}
        {{- if .Values.rateLimits.enabled }}
        - name: frontend-ratelimit
          namespace: dreamteams
        {{- end }}
      {{- end }}
      services:
        - name: {{ .Values.services.anubis.name }}
          port: {{ .Values.services.anubis.port }}
---
{{- end }}
{{- if and .Values.apexRedirect.enabled .Values.apexHost }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: dreamteams-apex-redirect
  namespace: dreamteams
spec:
  entryPoints:
    - websecure
  {{- if .Values.tls.enabled }}
  tls:
    secretName: {{ .Values.tls.appSecretName }}
  {{- end }}
  routes:
    - match: Host(`{{ .Values.apexHost }}`) && !PathPrefix(`/.well-known/acme-challenge/`)
      kind: Rule
      priority: 300
      middlewares:
        - name: apex-redirect
          namespace: dreamteams
      services:
        - name: {{ .Values.services.frontend.name }}
          port: {{ .Values.services.frontend.port }}
---
{{- end }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: dreamteams-http-redirect
  namespace: dreamteams
spec:
  entryPoints:
    - web
  routes:
    {{- if and .Values.apexRedirect.enabled .Values.apexHost }}
    - match: Host(`{{ .Values.apexHost }}`) && !PathPrefix(`/.well-known/acme-challenge/`)
      kind: Rule
      priority: 300
      middlewares:
        - name: apex-redirect
          namespace: dreamteams
      services:
        - name: {{ .Values.services.frontend.name }}
          port: {{ .Values.services.frontend.port }}
    {{- end }}
    - match: (Host(`{{ .Values.appHost }}`) || Host(`{{ .Values.authHost }}`) || Host(`{{ .Values.s3Host }}`) || Host(`{{ .Values.grafanaHost }}`)) && !PathPrefix(`/.well-known/acme-challenge/`)
      kind: Rule
      priority: 1
      middlewares:
        - name: redirect-to-https
          namespace: dreamteams
      services:
        - name: {{ .Values.services.frontend.name }}
          port: {{ .Values.services.frontend.port }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: dreamteams-web
  namespace: dreamteams
spec:
  entryPoints:
    {{- if .Values.anubis.enabled }}
    - {{ .Values.anubis.internalEntryPoint }}
    {{- else }}
    - websecure
    {{- end }}
  {{- if and .Values.tls.enabled (not .Values.anubis.enabled) }}
  tls:
    secretName: {{ .Values.tls.appSecretName }}
  {{- end }}
  routes:
    {{- if .Values.logout.enabled }}
    - match: Host(`{{ .Values.appHost }}`) && Path(`/logout`)
      kind: Rule
      priority: 200
      middlewares:
        {{- include "dreamteams_ingress.securityHeadersRef" . | nindent 8 }}
        {{- if .Values.rateLimits.enabled }}
        - name: frontend-ratelimit
          namespace: dreamteams
        {{- end }}
        - name: logout-redirect
          namespace: dreamteams
      services:
        - name: {{ .Values.services.frontend.name }}
          port: {{ .Values.services.frontend.port }}
    {{- end }}
    {{- if .Values.apiDocsAccess.blocked }}
    - match: Host(`{{ .Values.appHost }}`) && (Path(`/api/docs`) || PathPrefix(`/api/docs/`) || Path(`/api/openapi.json`))
      kind: Rule
      priority: 195
      middlewares:
        {{- include "dreamteams_ingress.securityHeadersRef" . | nindent 8 }}
        {{- include "dreamteams_ingress.anubisApiAuthRef" . | nindent 8 }}
        - name: api-docs-deny
          namespace: dreamteams
      services:
        - name: {{ .Values.services.api.name }}
          port: {{ .Values.services.api.port }}
    {{- else if .Values.apiDocsAccess.enabled }}
    - match: Host(`{{ .Values.appHost }}`) && (Path(`/api/docs`) || PathPrefix(`/api/docs/`) || Path(`/api/openapi.json`))
      kind: Rule
      priority: 195
      middlewares:
        {{- include "dreamteams_ingress.securityHeadersRef" . | nindent 8 }}
        {{- include "dreamteams_ingress.anubisApiAuthRef" . | nindent 8 }}
        - name: api-docs-ipallowlist
          namespace: dreamteams
        - name: oauth-errors
          namespace: dreamteams
        - name: oauth-auth
          namespace: dreamteams
      services:
        - name: {{ .Values.services.api.name }}
          port: {{ .Values.services.api.port }}
    {{- end }}
    - match: Host(`{{ .Values.appHost }}`) && PathPrefix(`/api/exports`) && Method(`POST`)
      kind: Rule
      priority: 190
      middlewares:
        {{- include "dreamteams_ingress.securityHeadersRef" . | nindent 8 }}
        {{- include "dreamteams_ingress.anubisApiAuthRef" . | nindent 8 }}
        {{- if .Values.rateLimits.enabled }}
        - name: export-create-ratelimit
          namespace: dreamteams
        {{- end }}
        - name: oauth-errors
          namespace: dreamteams
        - name: oauth-auth
          namespace: dreamteams
        - name: exporter-strip-prefix
          namespace: dreamteams
      services:
        - name: {{ .Values.services.exporter.name }}
          port: {{ .Values.services.exporter.port }}
    - match: Host(`{{ .Values.appHost }}`) && PathPrefix(`/api/exports`) && Method(`GET`)
      kind: Rule
      priority: 180
      middlewares:
        {{- include "dreamteams_ingress.securityHeadersRef" . | nindent 8 }}
        {{- include "dreamteams_ingress.anubisApiAuthRef" . | nindent 8 }}
        {{- if .Values.rateLimits.enabled }}
        - name: export-poll-ratelimit
          namespace: dreamteams
        {{- end }}
        - name: oauth-errors
          namespace: dreamteams
        - name: oauth-auth
          namespace: dreamteams
        - name: exporter-strip-prefix
          namespace: dreamteams
      services:
        - name: {{ .Values.services.exporter.name }}
          port: {{ .Values.services.exporter.port }}
    - match: Host(`{{ .Values.appHost }}`) && PathPrefix(`/api/exports`)
      kind: Rule
      priority: 175
      middlewares:
        {{- include "dreamteams_ingress.securityHeadersRef" . | nindent 8 }}
        {{- include "dreamteams_ingress.anubisApiAuthRef" . | nindent 8 }}
        {{- if .Values.rateLimits.enabled }}
        - name: api-default-ratelimit
          namespace: dreamteams
        {{- end }}
        - name: oauth-errors
          namespace: dreamteams
        - name: oauth-auth
          namespace: dreamteams
        - name: exporter-strip-prefix
          namespace: dreamteams
      services:
        - name: {{ .Values.services.exporter.name }}
          port: {{ .Values.services.exporter.port }}
    - match: Host(`{{ .Values.appHost }}`) && PathPrefix(`/api/users/superuser`) && Method(`POST`)
      kind: Rule
      priority: 170
      middlewares:
        {{- include "dreamteams_ingress.securityHeadersRef" . | nindent 8 }}
        {{- include "dreamteams_ingress.anubisApiAuthRef" . | nindent 8 }}
        {{- if .Values.rateLimits.enabled }}
        - name: identity-write-ratelimit
          namespace: dreamteams
        {{- end }}
        - name: oauth-errors
          namespace: dreamteams
        - name: oauth-auth
          namespace: dreamteams
      services:
        - name: {{ .Values.services.api.name }}
          port: {{ .Values.services.api.port }}
    - match: Host(`{{ .Values.appHost }}`) && PathPrefix(`/api/participants`) && Method(`POST`)
      kind: Rule
      priority: 170
      middlewares:
        {{- include "dreamteams_ingress.securityHeadersRef" . | nindent 8 }}
        {{- include "dreamteams_ingress.anubisApiAuthRef" . | nindent 8 }}
        {{- if .Values.rateLimits.enabled }}
        - name: identity-write-ratelimit
          namespace: dreamteams
        {{- end }}
        - name: oauth-errors
          namespace: dreamteams
        - name: oauth-auth
          namespace: dreamteams
      services:
        - name: {{ .Values.services.api.name }}
          port: {{ .Values.services.api.port }}
    - match: Host(`{{ .Values.appHost }}`) && PathPrefix(`/api/organizers`) && Method(`POST`)
      kind: Rule
      priority: 170
      middlewares:
        {{- include "dreamteams_ingress.securityHeadersRef" . | nindent 8 }}
        {{- include "dreamteams_ingress.anubisApiAuthRef" . | nindent 8 }}
        {{- if .Values.rateLimits.enabled }}
        - name: identity-write-ratelimit
          namespace: dreamteams
        {{- end }}
        - name: oauth-errors
          namespace: dreamteams
        - name: oauth-auth
          namespace: dreamteams
      services:
        - name: {{ .Values.services.api.name }}
          port: {{ .Values.services.api.port }}
    - match: Host(`{{ .Values.appHost }}`) && Path(`/api/users/me/avatar`) && Method(`PUT`)
      kind: Rule
      priority: 170
      middlewares:
        {{- include "dreamteams_ingress.securityHeadersRef" . | nindent 8 }}
        {{- include "dreamteams_ingress.anubisApiAuthRef" . | nindent 8 }}
        {{- if .Values.rateLimits.enabled }}
        - name: avatar-upload-ratelimit
          namespace: dreamteams
        {{- end }}
        - name: oauth-errors
          namespace: dreamteams
        - name: oauth-auth
          namespace: dreamteams
        {{- if .Values.avatarUpload.requestBodyLimit.enabled }}
        - name: avatar-upload-request-limit
          namespace: dreamteams
        {{- end }}
      services:
        - name: {{ .Values.services.api.name }}
          port: {{ .Values.services.api.port }}
    - match: Host(`{{ .Values.appHost }}`) && PathPrefix(`/api`) && (Method(`POST`) || Method(`PUT`) || Method(`PATCH`) || Method(`DELETE`))
      kind: Rule
      priority: 160
      middlewares:
        {{- include "dreamteams_ingress.securityHeadersRef" . | nindent 8 }}
        {{- include "dreamteams_ingress.anubisApiAuthRef" . | nindent 8 }}
        {{- if .Values.rateLimits.enabled }}
        - name: api-write-ratelimit
          namespace: dreamteams
        {{- end }}
        - name: oauth-errors
          namespace: dreamteams
        - name: oauth-auth
          namespace: dreamteams
      services:
        - name: {{ .Values.services.api.name }}
          port: {{ .Values.services.api.port }}
    - match: Host(`{{ .Values.appHost }}`) && PathPrefix(`/api/competitions/preview`) && Method(`GET`)
      kind: Rule
      priority: 150
      middlewares:
        {{- include "dreamteams_ingress.securityHeadersRef" . | nindent 8 }}
        {{- include "dreamteams_ingress.anubisApiAuthRef" . | nindent 8 }}
        {{- if .Values.rateLimits.enabled }}
        - name: public-preview-ratelimit
          namespace: dreamteams
        {{- end }}
        {{- if .Values.publicPreviewCache.enabled }}
        - name: public-preview-cache
          namespace: dreamteams
        {{- end }}
      services:
        - name: {{ .Values.services.api.name }}
          port: {{ .Values.services.api.port }}
    - match: Host(`{{ .Values.appHost }}`) && PathPrefix(`/api`)
      kind: Rule
      priority: 100
      middlewares:
        {{- include "dreamteams_ingress.securityHeadersRef" . | nindent 8 }}
        {{- include "dreamteams_ingress.anubisApiAuthRef" . | nindent 8 }}
        {{- if .Values.rateLimits.enabled }}
        - name: api-default-ratelimit
          namespace: dreamteams
        {{- end }}
        - name: oauth-errors
          namespace: dreamteams
        - name: oauth-auth
          namespace: dreamteams
      services:
        - name: {{ .Values.services.api.name }}
          port: {{ .Values.services.api.port }}
    - match: Host(`{{ .Values.appHost }}`) && PathPrefix(`/oauth2`)
      kind: Rule
      priority: 90
      {{- if or .Values.securityHeaders.enabled .Values.rateLimits.enabled }}
      middlewares:
        {{- include "dreamteams_ingress.securityHeadersRef" . | nindent 8 }}
        {{- if .Values.rateLimits.enabled }}
        - name: oauth2-ratelimit
          namespace: dreamteams
        {{- end }}
      {{- end }}
      services:
        - name: {{ .Values.services.oauth2Proxy.name }}
          port: {{ .Values.services.oauth2Proxy.port }}
    - match: Host(`{{ .Values.appHost }}`) && PathPrefix(`/s3`)
      kind: Rule
      priority: 90
      middlewares:
        {{- include "dreamteams_ingress.securityHeadersRef" . | nindent 8 }}
        {{- if .Values.rateLimits.enabled }}
        - name: s3-ratelimit
          namespace: dreamteams
        {{- end }}
        - name: s3-strip-prefix
          namespace: dreamteams
      services:
        - name: {{ .Values.services.rustfs.name }}
          port: {{ .Values.services.rustfs.port }}
    - match: Host(`{{ .Values.appHost }}`)
      kind: Rule
      priority: 1
      {{- if or .Values.securityHeaders.enabled .Values.rateLimits.enabled }}
      middlewares:
        {{- include "dreamteams_ingress.securityHeadersRef" . | nindent 8 }}
        {{- if .Values.rateLimits.enabled }}
        - name: frontend-ratelimit
          namespace: dreamteams
        {{- end }}
      {{- end }}
      services:
        - name: {{ .Values.services.frontend.name }}
          port: {{ .Values.services.frontend.port }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: dreamteams-s3
  namespace: dreamteams
spec:
  entryPoints:
    - websecure
  {{- if .Values.tls.enabled }}
  tls:
    secretName: {{ .Values.tls.s3SecretName }}
  {{- end }}
  routes:
    - match: Host(`{{ .Values.s3Host }}`)
      kind: Rule
      {{- if .Values.rateLimits.enabled }}
      middlewares:
        - name: public-client-ip-headers
          namespace: dreamteams
        - name: s3-ratelimit
          namespace: dreamteams
      {{- end }}
      services:
        - name: {{ .Values.services.rustfs.name }}
          port: {{ .Values.services.rustfs.port }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: dreamteams-auth
  namespace: {{ .Values.services.authentik.namespace }}
spec:
  entryPoints:
    - websecure
  {{- if .Values.tls.enabled }}
  tls:
    secretName: {{ .Values.tls.authSecretName }}
  {{- end }}
  routes:
    - match: Host(`{{ .Values.authHost }}`)
      kind: Rule
      {{- if .Values.rateLimits.enabled }}
      middlewares:
        - name: public-client-ip-headers
          namespace: {{ .Values.services.authentik.namespace }}
        - name: authentik-ratelimit
          namespace: {{ .Values.services.authentik.namespace }}
      {{- end }}
      services:
        - name: {{ .Values.services.authentik.name }}
          port: {{ .Values.services.authentik.port }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: dreamteams-grafana
  namespace: {{ .Values.services.grafana.namespace }}
spec:
  entryPoints:
    - websecure
  {{- if .Values.tls.enabled }}
  tls:
    secretName: {{ .Values.tls.grafanaSecretName }}
  {{- end }}
  routes:
    - match: Host(`{{ .Values.grafanaHost }}`)
      kind: Rule
      {{- if .Values.rateLimits.enabled }}
      middlewares:
        - name: public-client-ip-headers
          namespace: {{ .Values.services.grafana.namespace }}
        - name: grafana-ratelimit
          namespace: {{ .Values.services.grafana.namespace }}
      {{- end }}
      services:
        - name: {{ .Values.services.grafana.name }}
          port: {{ .Values.services.grafana.port }}
