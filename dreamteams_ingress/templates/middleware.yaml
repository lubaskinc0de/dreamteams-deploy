apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: dreamteams
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
{{- if and .Values.apexRedirect.enabled .Values.apexHost }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: apex-redirect
  namespace: dreamteams
spec:
  redirectRegex:
    regex: {{ printf "^https?://%s(/.*)?$" (.Values.apexHost | replace "." "\\.") | quote }}
    replacement: {{ printf "https://%s${1}" .Values.appHost | quote }}
    permanent: true
---
{{- end }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: exporter-strip-prefix
  namespace: dreamteams
spec:
  stripPrefix:
    prefixes:
      - /api
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: s3-strip-prefix
  namespace: dreamteams
spec:
  stripPrefix:
    prefixes:
      - /s3
---
{{- if and .Values.apiDocsAccess.enabled (not .Values.apiDocsAccess.blocked) }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: api-docs-ipallowlist
  namespace: dreamteams
spec:
  ipAllowList:
    sourceRange:
      {{- toYaml .Values.apiDocsAccess.sourceRange | nindent 6 }}
---
{{- end }}
{{- if .Values.apiDocsAccess.blocked }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: api-docs-deny
  namespace: dreamteams
spec:
  ipAllowList:
    sourceRange:
      - 192.0.2.0/32
---
{{- end }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: logout-redirect
  namespace: dreamteams
spec:
  redirectRegex:
    regex: ^https?://[^/]+/logout$
    replacement: /oauth2/sign_out?rd={{ .Values.logout.endSessionUrl | urlquery }}%3Fpost_logout_redirect_uri%3D{{ .Values.logout.postLogoutRedirectUrl | urlquery }}%26id_token_hint%3D%7Bid_token%7D
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth-auth
  namespace: dreamteams
spec:
  forwardAuth:
    address: http://{{ .Values.services.oauth2Proxy.name }}.dreamteams:{{ .Values.services.oauth2Proxy.port }}/oauth2/auth
    trustForwardHeader: true
    maxResponseBodySize: {{ .Values.forwardAuth.maxResponseBodySize | int64 }}
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - X-Auth-Request-Access-Token
      - Authorization
---
{{- if .Values.securityHeaders.enabled }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: security-headers
  namespace: dreamteams
spec:
  headers:
    frameDeny: {{ .Values.securityHeaders.frameDeny }}
    contentTypeNosniff: {{ .Values.securityHeaders.contentTypeNosniff }}
    referrerPolicy: {{ .Values.securityHeaders.referrerPolicy | quote }}
    permissionsPolicy: {{ .Values.securityHeaders.permissionsPolicy | quote }}
    {{- if gt (int .Values.securityHeaders.stsSeconds) 0 }}
    stsSeconds: {{ .Values.securityHeaders.stsSeconds | int }}
    stsIncludeSubdomains: {{ .Values.securityHeaders.stsIncludeSubdomains }}
    stsPreload: {{ .Values.securityHeaders.stsPreload }}
    {{- end }}
    {{- if .Values.securityHeaders.contentSecurityPolicy.enabled }}
    contentSecurityPolicy: {{ .Values.securityHeaders.contentSecurityPolicy.value | quote }}
    {{- end }}
---
{{- end }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth-errors
  namespace: dreamteams
spec:
  errors:
    status:
      - "401-403"
    service:
      name: {{ .Values.services.oauth2Proxy.name }}
      port: {{ .Values.services.oauth2Proxy.port }}
    query: "/oauth2/sign_in?rd={url}"
{{- if .Values.avatarUpload.requestBodyLimit.enabled }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: avatar-upload-request-limit
  namespace: dreamteams
spec:
  buffering:
    maxRequestBodyBytes: {{ .Values.avatarUpload.requestBodyLimit.maxRequestBodyBytes | int64 }}
    {{- with .Values.avatarUpload.requestBodyLimit.memRequestBodyBytes }}
    memRequestBodyBytes: {{ . | int64 }}
    {{- end }}
{{- end }}
{{- if .Values.rateLimits.enabled }}
{{ include "dreamteams_ingress.rateLimitMiddleware" (dict "root" . "name" "frontend-ratelimit" "namespace" "dreamteams" "limit" .Values.rateLimits.frontend) }}
{{ include "dreamteams_ingress.rateLimitMiddleware" (dict "root" . "name" "oauth2-ratelimit" "namespace" "dreamteams" "limit" .Values.rateLimits.oauth2) }}
{{ include "dreamteams_ingress.rateLimitMiddleware" (dict "root" . "name" "public-preview-ratelimit" "namespace" "dreamteams" "limit" .Values.rateLimits.publicPreview) }}
{{ include "dreamteams_ingress.rateLimitMiddleware" (dict "root" . "name" "api-default-ratelimit" "namespace" "dreamteams" "limit" .Values.rateLimits.apiDefault) }}
{{ include "dreamteams_ingress.rateLimitMiddleware" (dict "root" . "name" "api-write-ratelimit" "namespace" "dreamteams" "limit" .Values.rateLimits.apiWrite) }}
{{ include "dreamteams_ingress.rateLimitMiddleware" (dict "root" . "name" "identity-write-ratelimit" "namespace" "dreamteams" "limit" .Values.rateLimits.identityWrite) }}
{{ include "dreamteams_ingress.rateLimitMiddleware" (dict "root" . "name" "avatar-upload-ratelimit" "namespace" "dreamteams" "limit" .Values.rateLimits.avatarUpload) }}
{{ include "dreamteams_ingress.rateLimitMiddleware" (dict "root" . "name" "export-create-ratelimit" "namespace" "dreamteams" "limit" .Values.rateLimits.exportCreate) }}
{{ include "dreamteams_ingress.rateLimitMiddleware" (dict "root" . "name" "export-poll-ratelimit" "namespace" "dreamteams" "limit" .Values.rateLimits.exportPoll) }}
{{ include "dreamteams_ingress.rateLimitMiddleware" (dict "root" . "name" "s3-ratelimit" "namespace" "dreamteams" "limit" .Values.rateLimits.s3) }}
{{ include "dreamteams_ingress.rateLimitMiddleware" (dict "root" . "name" "authentik-ratelimit" "namespace" .Values.services.authentik.namespace "limit" .Values.rateLimits.authentik) }}
{{ include "dreamteams_ingress.rateLimitMiddleware" (dict "root" . "name" "grafana-ratelimit" "namespace" .Values.services.grafana.namespace "limit" .Values.rateLimits.grafana) }}
{{- end }}
