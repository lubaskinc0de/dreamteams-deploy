apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth-auth
  namespace: dreamteams
spec:
  forwardAuth:
    address: http://dreamteams-oauth2proxy-oauth2-proxy.dreamteams:8000/oauth2/auth
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - X-Auth-Request-Access-Token
      - Authorization
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth-errors
  namespace: dreamteams
spec:
  errors:
    status:
      - "401-403"
    service:
      name: dreamteams-oauth2proxy-oauth2-proxy
      port: 8000
    query: "/oauth2/sign_in?rd={url}"
