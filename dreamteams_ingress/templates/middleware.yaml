apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: exporter-strip-prefix
  namespace: dreamteams
spec:
  stripPrefix:
    prefixes:
      - /api
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: s3-strip-prefix
  namespace: dreamteams
spec:
  stripPrefix:
    prefixes:
      - /s3
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: logout-redirect
  namespace: dreamteams
spec:
  redirectRegex:
    regex: ^https?://[^/]+/logout$
    replacement: /oauth2/sign_out?rd={{ .Values.logout.endSessionUrl | urlquery }}%3Fpost_logout_redirect_uri%3D{{ .Values.logout.postLogoutRedirectUrl | urlquery }}%26id_token_hint%3D%7Bid_token%7D
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth-auth
  namespace: dreamteams
spec:
  forwardAuth:
    address: http://{{ .Values.services.oauth2Proxy.name }}.dreamteams:{{ .Values.services.oauth2Proxy.port }}/oauth2/auth
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - X-Auth-Request-Access-Token
      - Authorization
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth-errors
  namespace: dreamteams
spec:
  errors:
    status:
      - "401-403"
    service:
      name: {{ .Values.services.oauth2Proxy.name }}
      port: {{ .Values.services.oauth2Proxy.port }}
    query: "/oauth2/sign_in?rd={url}"
