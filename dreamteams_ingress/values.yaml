appHost: dreamteams.localhost
authHost: auth.dreamteams.localhost
grafanaHost: grafana.dreamteams.localhost
s3Host: s3.dreamteams.localhost
issuerName: dreamteams-local

tls:
  enabled: true
  appSecretName: dreamteams-app-tls
  authSecretName: dreamteams-auth-tls
  grafanaSecretName: dreamteams-grafana-tls
  s3SecretName: dreamteams-s3-tls

services:
  anubis:
    name: dreamteams-anubis
    port: 80
  frontend:
    name: dreamteams-frontend
    port: 80
  api:
    name: dreamteams-api
    port: 5000
  exporter:
    name: dreamteams-exporter
    port: 8001
  oauth2Proxy:
    name: dreamteams-oauth2proxy-oauth2-proxy
    port: 8000
  rustfs:
    name: dreamteams-rustfs-svc
    port: 9000
  authentik:
    name: dreamteams-authentik-server
    namespace: authentik
    port: 80
  grafana:
    name: grafana
    namespace: observability
    port: 3000

logout:
  enabled: true
  endSessionUrl: "https://auth.dreamteams.localhost/application/o/dreamteams/end-session/"
  postLogoutRedirectUrl: "https://dreamteams.localhost/"

anubis:
  enabled: true

apiDocsAccess:
  blocked: true
  enabled: false
  sourceRange:
    - 127.0.0.1/32

avatarUpload:
  requestBodyLimit:
    enabled: true
    maxRequestBodyBytes: 5242880
    memRequestBodyBytes: 1048576

forwardAuth:
  maxResponseBodySize: 1048576

securityHeaders:
  enabled: true
  frameDeny: true
  contentTypeNosniff: true
  referrerPolicy: no-referrer
  permissionsPolicy: "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
  stsSeconds: 0
  stsIncludeSubdomains: false
  stsPreload: false
  contentSecurityPolicy:
    enabled: false
    value: ""

networkPolicy:
  enabled: true

rateLimits:
  enabled: true
  redis:
    enabled: true
    endpoints:
      - dreamteams-redis-master.dreamteams.svc.cluster.local:6379
    db: 4
    dialTimeout: 1s
    readTimeout: 1s
    writeTimeout: 1s
    poolSize: 20
  frontend:
    average: 300
    burst: 60
    period: 1m
  oauth2:
    average: 60
    burst: 20
    period: 1m
  publicPreview:
    average: 60
    burst: 20
    period: 1m
  apiDefault:
    average: 120
    burst: 30
    period: 1m
  apiWrite:
    average: 30
    burst: 10
    period: 1m
  identityWrite:
    average: 10
    burst: 5
    period: 1m
  avatarUpload:
    average: 6
    burst: 3
    period: 1m
  exportCreate:
    average: 10
    burst: 3
    period: 1m
  exportPoll:
    average: 60
    burst: 20
    period: 1m
  s3:
    average: 120
    burst: 40
    period: 1m
  authentik:
    average: 60
    burst: 20
    period: 1m
  grafana:
    average: 60
    burst: 20
    period: 1m
