apiVersion: v1
kind: Namespace
metadata:
  name: dreamteams
---
apiVersion: v1
kind: Namespace
metadata:
  name: authentik
---
apiVersion: v1
kind: Namespace
metadata:
  name: observability
---
apiVersion: v1
kind: Secret
metadata:
  name: dreamteams-postgres-secret
  namespace: dreamteams
type: Opaque
stringData:
  postgres-password: postgres
  password: postgres
---
apiVersion: v1
kind: Secret
metadata:
  name: authentik-env
  namespace: authentik
type: Opaque
stringData:
  AUTHENTIK_SECRET_KEY: local-authentik-secret-key-change-me
  AUTHENTIK_POSTGRESQL__HOST: dreamteams-authentik-postgresql
  AUTHENTIK_POSTGRESQL__NAME: authentik
  AUTHENTIK_POSTGRESQL__USER: authentik
  AUTHENTIK_POSTGRESQL__PASSWORD: local-authentik-postgres-password
  AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
  DREAMTEAMS_OIDC_CLIENT_ID: local-client-id
  DREAMTEAMS_OIDC_CLIENT_SECRET: local-client-secret
---
apiVersion: v1
kind: Secret
metadata:
  name: authentik-postgres-secret
  namespace: authentik
type: Opaque
stringData:
  postgres-password: local-authentik-postgres-password
  password: local-authentik-postgres-password
---
apiVersion: v1
kind: Secret
metadata:
  name: dreamteams-postgres-initdb
  namespace: dreamteams
type: Opaque
stringData:
  init.sql: |
    CREATE EXTENSION IF NOT EXISTS pg_trgm;

    CREATE USER grafana WITH PASSWORD 'grafana-password';
    GRANT CONNECT ON DATABASE postgres TO grafana;
    GRANT USAGE ON SCHEMA public TO grafana;
    GRANT SELECT ON ALL TABLES IN SCHEMA public TO grafana;
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON TABLES TO grafana;

    CREATE USER migrations WITH PASSWORD 'migrations-password';
    GRANT CONNECT ON DATABASE postgres TO migrations;
    GRANT CREATE, USAGE ON SCHEMA public TO migrations;
    GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO migrations;
    GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO migrations;

    CREATE USER app_user WITH PASSWORD 'app-password';
    GRANT CONNECT ON DATABASE postgres TO app_user;
    GRANT USAGE ON SCHEMA public TO app_user;
    GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO app_user;
    GRANT USAGE ON ALL SEQUENCES IN SCHEMA public TO app_user;

    ALTER DEFAULT PRIVILEGES FOR ROLE migrations IN SCHEMA public
      GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO app_user;
    ALTER DEFAULT PRIVILEGES FOR ROLE migrations IN SCHEMA public
      GRANT USAGE ON SEQUENCES TO app_user;
---
apiVersion: v1
kind: Secret
metadata:
  name: dreamteams-pgbouncer-secret
  namespace: dreamteams
type: Opaque
stringData:
  DB_USER: app_user
  DB_PASSWORD: app-password
---
apiVersion: v1
kind: Secret
metadata:
  name: dreamteams-rustfs-secret
  namespace: dreamteams
type: Opaque
stringData:
  access_key: localadmin
  secret_key: localadmin123
  RUSTFS_ACCESS_KEY: localadmin
  RUSTFS_SECRET_KEY: localadmin123
---
apiVersion: v1
kind: Secret
metadata:
  name: dreamteams-oauth2proxy-secret
  namespace: dreamteams
type: Opaque
stringData:
  client-id: local-client-id
  client-secret: local-client-secret
  cookie-secret: z2VpXUQxfDgXzQQwIEST3XTbTDosjHJa
---
apiVersion: v1
kind: Secret
metadata:
  name: dreamteams-api-config
  namespace: dreamteams
type: Opaque
stringData:
  config.toml: |
    [auth]
    user_id_header = "X-Auth-Request-User"
    user_email_header = "X-Auth-Request-Email"
    access_token_header = "X-Auth-Request-Access-Token"
    access_token_alg = "RS256"
    allow_unverified_email = true

    [otel]
    endpoint = "http://otel-collector.observability:4318"
    service_name = "dreamteams"
    sample_ratio = 0.5
    metric_export_interval_ms = 10000
    instrument_sqlalchemy = true
    enabled = true

    [cors]
    allow_origins = ["https://dreamteams.localhost"]
    allow_credentials = true
    allow_methods = ["*"]
    allow_headers = ["*"]

    [api]
    root_path = "/api"

    [tracing]
    trace_id_header = "X-Request-ID"
    trace_id_required = false

    [server]
    host = "0.0.0.0"
    port = 5000
    workers = 1

    [db]
    user = "app_user"
    password = "app-password"
    host = "dreamteams-pgbouncer"
    port = 6432
    db_name = "postgres"
    max_total_pool_size = 20
    max_total_overflow = 5

    [s3]
    bucket_name = "users"
    endpoint_url = "http://dreamteams-rustfs-svc:9000"
    access_key = "localadmin"
    secret_key = "localadmin123"
    region = "us-east-1"
    public_url = "https://dreamteams.localhost/s3"

    [superuser]
    password_hash = '$argon2id$v=19$m=65536,t=3,p=4$WtB09we21GMOQ8kjBOFnrQ$ZU8lTm3cNPhFe90PGfH5sliQvzlbZf6DKztbxNlOl2s'

    [sentry]
    dsn = ""

    [cache]
    url = "redis://dreamteams-redis-master:6379/1"
    auth_user_ttl_seconds = 3600
    auth_user_ttl_jitter_seconds = 300
    blocked_user_ttl_seconds = 86400
    application_form_ttl_seconds = 900
    competition_tags_ttl_seconds = 1800
    competition_read_ttl_seconds = 120
---
apiVersion: v1
kind: Secret
metadata:
  name: dreamteams-migrations-config
  namespace: dreamteams
type: Opaque
stringData:
  migrations.toml: |
    [db]
    user = "migrations"
    password = "migrations-password"
    host = "dreamteams-postgres-postgresql"
    port = 5432
    db_name = "postgres"
    max_total_pool_size = 1
    max_total_overflow = 0
---
apiVersion: v1
kind: Secret
metadata:
  name: dreamteams-exporter-config
  namespace: dreamteams
type: Opaque
stringData:
  config.toml: |
    [cache]
    url = "redis://dreamteams-redis-master:6379/3"
    rate_limit_window_seconds = 3600
    rate_limit_max = 10

    [nats]
    url = "nats://dreamteams-nats:4222"
    stream_name = "exporter"
    process_subject = "exporter.jobs.process"
    process_consumer = "exporter-worker"

    [s3]
    bucket_name = "exports"
    endpoint_url = "http://dreamteams-rustfs-svc:9000"
    access_key = "localadmin"
    secret_key = "localadmin123"
    region = "us-east-1"
    download_endpoint_url = "https://s3.dreamteams.localhost"
    export_file_lifetime_days = 1
    presigned_url_ttl_seconds = 900

    [dreamteams_api]
    base_url = "http://dreamteams-api:5000/api"
    auth_header_name = "X-Auth-Request-User"
    timeout_seconds = 10.0
    retry_attempts = 3
    retry_backoff_base_seconds = 0.1
    retry_backoff_max_seconds = 1.0

    [server]
    host = "0.0.0.0"
    port = 8001
    workers = 1

    [otel]
    endpoint = "http://otel-collector.observability:4318"
    service_name = "dreamteams-exporter"
    sample_ratio = 0.5
    metric_export_interval_ms = 10000
    instrument_sqlalchemy = false
    enabled = true

    [sentry]
    dsn = ""
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: observability
type: Opaque
stringData:
  admin-user: admin
  admin-password: admin
