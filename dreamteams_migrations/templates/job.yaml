apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-migrations-{{ .Values.image.tag | default .Chart.AppVersion | replace "." "-" | replace ":" "-" }}
  labels:
    app.kubernetes.io/name: dreamteams-migrations
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  backoffLimit: 3
  template:
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: Never
      initContainers:
        - name: wait-for-db
          image: busybox:1.37
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Values.waitFor.host }} {{ .Values.waitFor.port }}; do
                echo "Waiting for database..."
                sleep 2
              done
      containers:
        - name: migrations
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command:
            - dreamteams
            - migrations
            - apply
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/dreamteams/migrations.toml
              subPath: {{ .Values.config.key }}
              readOnly: true
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          secret:
            secretName: {{ required "config.existingSecret is required" .Values.config.existingSecret }}
