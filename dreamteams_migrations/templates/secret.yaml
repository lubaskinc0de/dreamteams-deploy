apiVersion: v1
kind: Secret
metadata:
    name: {{ .Release.Name }}-migrations-secret
    labels:
        app.kubernetes.io/name: dreamteams-migrations
        app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
    {{- range $key, $value := .Values.secretEnv }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}