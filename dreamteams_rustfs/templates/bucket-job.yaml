apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-buckets
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
  labels:
    app.kubernetes.io/name: dreamteams-rustfs-buckets
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dreamteams-rustfs-buckets
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: buckets
          image: {{ .Values.bucketJob.image }}
          workingDir: /tmp
          command:
            - sh
            - -c
            - |
              until mc alias set rustfs http://dreamteams-rustfs-svc:9000 "$RUSTFS_ACCESS_KEY" "$RUSTFS_SECRET_KEY"; do
                sleep 2
              done
              mc mb --ignore-existing rustfs/users
              mc mb --ignore-existing rustfs/exports
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
          resources:
            {{- toYaml .Values.bucketJob.resources | nindent 12 }}
          env:
            - name: HOME
              value: /tmp
            - name: RUSTFS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: dreamteams-rustfs-secret
                  key: RUSTFS_ACCESS_KEY
            - name: RUSTFS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: dreamteams-rustfs-secret
                  key: RUSTFS_SECRET_KEY
